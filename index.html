<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Morgan reporting</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.0/dist/umd/supabase.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 700px; box-sizing: border-box; position: relative; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        h1 { font-size: 22px; color: #fff; margin: 0; }
        h2 { font-size: 16px; margin-top: 0; margin-bottom: 15px; color: #3ecf8e; }
        
        .password-container { position: relative; width: 100%; margin-bottom: 15px; display: flex; align-items: center; }
        input, textarea, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #333; background: #252525; color: #fff; box-sizing: border-box; font-size: 14px; }
        .password-container input { margin-bottom: 0; padding-right: 45px; }
        .toggle-password { position: absolute; right: 12px; cursor: pointer; color: #888; font-size: 18px; user-select: none; z-index: 10; }
        
        /* Boutons spécifiques */
        button { background: #3ecf8e; color: #fff; font-weight: bold; border: none; cursor: pointer; transition: background 0.2s; margin-top: 5px; }
        button:hover { background: #34b27b; }
        .btn-action { width: auto; padding: 10px 15px; margin: 0; font-size: 13px; }
        .btn-secondary { background: #333; color: #ccc; }
        .btn-secondary:hover { background: #444; }
        
        .hidden { display: none !important; }
        .status { font-size: 14px; margin-top: 10px; text-align: center; padding: 8px; border-radius: 4px; }
        .success { color: #3ecf8e; background: rgba(62, 207, 142, 0.1); }
        .error { color: #f25c54; background: rgba(242, 92, 84, 0.1); }
        
        /* Tableau d'affichage du Dashboard */
        .table-container { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th, td { padding: 12px; border-bottom: 1px solid #333; }
        th { background: #252525; color: #3ecf8e; font-weight: bold; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .empty-msg { color: #888; text-align: center; padding: 20px; font-size: 13px; }
        
        /* Formulaire */
        .form-group { margin-bottom: 5px; }
        .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="login-screen" class="card">
        <h1>Dashboard Morgan reporting</h1>
        <div class="password-container">
            <input type="password" id="password-input" placeholder="Entrez le mot de passe secret">
            <span class="toggle-password" onclick="togglePasswordVisibility()">👁️</span>
        </div>
        <button onclick="checkPassword()">Accéder au dashboard</button>
        <div id="login-error" class="status error hidden">Mot de passe incorrect.</div>
    </div>

    <div id="dashboard-screen" class="card hidden">
        <div class="header-container">
            <h1>Dashboard Morgan reporting</h1>
            <button class="btn-action" onclick="goToForm()">Push Supabase</button>
        </div>
        
        <h2>Historique des entrées en direct</h2>
        <div class="table-container">
            <table id="reporting-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Client</th>
                        <th>Affaire Furious</th>
                        <th>Tarif (€)</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="4" class="empty-msg">Chargement du flux...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="form-screen" class="card hidden">
        <div class="header-container">
            <h1>Nouvelle Entrée</h1>
            <button class="btn-action btn-secondary" onclick="goToDashboard()">Retour au dashboard</button>
        </div>

        <div class="form-group">
            <label for="form-date">Date de la formation</label>
            <input type="date" id="form-date">
        </div>

        <div class="form-group">
            <label for="form-client">Nom du Client</label>
            <input type="text" id="form-client" placeholder="Ex: BMW, SEB...">
        </div>

        <div class="form-group">
            <label for="form-furious">Nom de l'affaire Furious</label>
            <input type="text" id="form-furious" placeholder="Ex: F_2026_IA_01">
        </div>

        <div class="form-group">
            <label for="form-tarif">Tarif (€)</label>
            <input type="number" id="form-tarif" placeholder="Ex: 5000">
        </div>

        <button id="submit-btn" onclick="sendToSupabase()">Valider et ajouter l'entrée</button>
        <div id="status-message" class="status hidden"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://pwfuuxttjlcpfaojtksl.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3ZnV1eHR0amxjcGZhb2p0a3NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4MjA1MzksImV4cCI6MjA5ODM5NjUzOX0.CoWrh7f5vVSeGl37rgc2czWrOhnxWgHYYfpfdO9OEUo";
        
        // SÉCURITÉ : Renseigne ton mot de passe ici
        const SECRET_PASSWORD = "Ytqywa613%%"; 

        let supabaseClient;

        window.addEventListener('load', () => {
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        });

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password-input');
            const toggleIcon = document.querySelector('.toggle-password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.innerText = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleIcon.innerText = '👁️';
            }
        }

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === SECRET_PASSWORD) {
                document.getElementById('login-screen').classList.add('hidden');
                goToDashboard();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        // Navigation : Vers l'accueil Dashboard
        function goToDashboard() {
            document.getElementById('form-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            fetchEntries();
        }

        // Navigation : Vers le Formulaire
        function goToForm() {
            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('form-screen').classList.remove('hidden');
            document.getElementById('status-message').classList.add('hidden');
            // Pré-remplir la date du jour par défaut
            document.getElementById('form-date').valueAsDate = new Date();
        }

        // Récupérer et afficher les lignes structurées
        async function fetchEntries() {
            const tbody = document.getElementById('table-body');
            if (!supabaseClient) return;

            const { data, error } = await supabaseClient
                .from('mes_notes')
                .select('date_formation, client, nom_affaire_furious, tarif')
                .order('id', { ascending: false });

            if (error) {
                tbody.innerHTML = `<tr><td colspan="4" style="color:#f25c54;">Erreur : ${error.message}</td></tr>`;
                return;
            }

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="empty-msg">Aucun reporting enregistré.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(item => {
                const dateClean = item.date_formation ? new Date(item.date_formation).toLocaleDateString('fr-FR') : 'Non définie';
                const formatTarif = item.tarif ? Number(item.tarif).toLocaleString('fr-FR') + ' €' : '0 €';
                return `
                    <tr>
                        <td>${dateClean}</td>
                        <td><strong>${escapeHtml(item.client || '')}</strong></td>
                        <td>${escapeHtml(item.nom_affaire_furious || '')}</td>
                        <td style="color: #3ecf8e; font-weight: bold;">${formatTarif}</td>
                    </tr>
                `;
            }).join('');
        }

        // Envoyer le formulaire structuré à Supabase
        async function sendToSupabase() {
            const dateVal = document.getElementById('form-date').value;
            const clientVal = document.getElementById('form-client').value;
            const furiousVal = document.getElementById('form-furious').value;
            const tarifVal = document.getElementById('form-tarif').value;
            const btn = document.getElementById('submit-btn');

            if (!clientVal.trim() || !tarifVal.trim()) {
                showStatus("Les champs 'Client' et 'Tarif' sont obligatoires.", "error");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Ajout en cours...";

            // Insertion des données structurées, la colonne 'contenu' garde une trace de secours
            const { data, error } = await supabaseClient
                .from('mes_notes')
                .insert([{ 
                    date_formation: dateVal,
                    client: clientVal,
                    nom_affaire_furious: furiousVal,
                    tarif: parseFloat(tarifVal),
                    contenu: `${clientVal} - ${furiousVal} : ${tarifVal}€`
                }]);

            btn.disabled = false;
            btn.innerText = "Valider et ajouter l'entrée";

            if (error) {
                showStatus("Erreur d'insertion : " + error.message, "error");
            } else {
                showStatus("Données ajoutées avec succès !", "success");
                // Nettoyage du formulaire pour la prochaine saisie
                document.getElementById('form-client').value = "";
                document.getElementById('form-furious').value = "";
                document.getElementById('form-tarif').value = "";
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function showStatus(msg, type) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.innerText = msg;
            statusDiv.className = "status " + type;
            statusDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
